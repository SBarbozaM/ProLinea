workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: pe.linea.lineaempresa
    
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      
      - name: Fix iOS Deployment Target
        script: |
          cd ios
          echo "platform :ios, '15.0'" > Podfile.new
          cat Podfile | grep -v "^platform :ios" >> Podfile.new
          mv Podfile.new Podfile
          cd ..

      - name: Setup rive_native
        script: |
          cd $CM_BUILD_DIR
          dart run rive_native:setup --platform ios

      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles

      - name: Set APS Environment
        script: |
          ENTITLEMENTS_FILE="$CM_BUILD_DIR/ios/Runner/Runner.entitlements"
          
          cat > "$ENTITLEMENTS_FILE" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>aps-environment</key>
            <string>production</string>
            <key>com.apple.security.application-groups</key>
            <array>
              <string>group.pe.linea.lineaempresa.onesignal</string>
            </array>
          </dict>
          </plist>
          EOF
          
          echo "=== Entitlements ==="
          cat "$ENTITLEMENTS_FILE"

      - name: Build iOS App
        script: |
          PROFILE_FILE=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision | head -1)
          echo "Profile file: $PROFILE_FILE"
          
          openssl smime -inform DER -verify -noverify -in "$PROFILE_FILE" -out /tmp/profile_decoded.plist 2>/dev/null
          echo "OpenSSL decode exit: $?"
          cat /tmp/profile_decoded.plist | head -20
          
          NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/profile_decoded.plist 2>/dev/null)
          echo "Profile Name: $NAME"
          
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>W4DR9N95K2</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>pe.linea.lineaempresa</key>
              <string>$NAME</string>
            </dict>
          </dict>
          </plist>
          EOF
          
          echo "=== ExportOptions.plist ==="
          cat /tmp/ExportOptions.plist
          
          flutter build ipa --release --export-options-plist=/tmp/ExportOptions.plist
          
      - name: Verify IPA exists
        script: |
          echo "Searching for IPA files..."
          find "$CM_BUILD_DIR" -name "*.ipa" -type f
          ls -la build/ios/ipa/ || echo "Directory not found"

      - name: Publish to TestFlight
        script: |
          app-store-connect publish \
            --path build/ios/ipa/*.ipa \
            --testflight
    
    artifacts:
      - build/ios/ipa/*.ipa